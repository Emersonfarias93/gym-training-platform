  llm-service:
    build:
      context: ..
      dockerfile: backend/llm-service/Dockerfile
    ports:
      - "8087:8080"
    depends_on:
      - postgres
      - kafka
    networks:
      - gym-network
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_TEMPERATURE: ${GROQ_TEMPERATURE:-0.7}
      SERVER_PORT: ${BACKEND_SERVER_PORT:-8080}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${POSTGRES_HOST:-postgres}:5432/gym_training
      SPRING_DATASOURCE_USERNAME: gym_user
      SPRING_DATASOURCE_PASSWORD: gym_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  web-app:
    build:
      context: ../frontend/web-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ENABLE_MOCK_CHECKOUT: ${NEXT_PUBLIC_ENABLE_MOCK_CHECKOUT:-false}
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - user-service
      - workout-service
    networks:
      - gym-network
    environment:
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8080}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://user-service:8080}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://payment-service:8080}
      WORKOUT_SERVICE_URL: ${WORKOUT_SERVICE_URL:-http://workout-service:8080}
      LLM_SERVICE_URL: ${LLM_SERVICE_URL:-http://llm-service:8080}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      NEXT_PUBLIC_ENABLE_MOCK_CHECKOUT: ${NEXT_PUBLIC_ENABLE_MOCK_CHECKOUT:-false}

volumes:
  postgres_data:

networks:
  gym-network:
    driver: bridge
