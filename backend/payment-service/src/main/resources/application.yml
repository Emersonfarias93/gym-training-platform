spring:
  application:
    name: payment-service
  config:
    import: optional:classpath:application-local.yml
  kafka:
    bootstrap-servers: localhost:9092

confrapix:
  api:
    base-url: ${CONFRAPIX_BASE_URL:https://api.confrapix.com.br}
    token: ${CONFRAPIX_TOKEN:}
    callback-url: ${CONFRAPIX_CALLBACK_URL:}

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
