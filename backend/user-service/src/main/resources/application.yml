spring:
  application:
    name: user-service
  datasource:
    url: ${USER_DB_URL:jdbc:postgresql://localhost:5432/gym_users}
    username: ${USER_DB_USERNAME:gym_user}
    password: ${USER_DB_PASSWORD:gym_pass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ${USER_KAFKA_GROUP:user-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.gym.training.user.kafka"
        spring.json.value.default.type: com.gym.training.user.kafka.PaymentConfirmedEvent

application:
  kafka:
    topics:
      payment-events: ${PAYMENT_EVENTS_TOPIC:payment.events}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
