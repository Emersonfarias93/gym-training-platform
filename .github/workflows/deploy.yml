name: Deploy SaveInCloud

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /opt/gym-training-platform
            
            cat > .env <<EOF
            AUTH_SERVICE_URL=http://auth-service:8080
            USER_SERVICE_URL=http://user-service:8080
            PAYMENT_SERVICE_URL=http://payment-service:8080
            WORKOUT_SERVICE_URL=http://workout-service:8080
            LLM_SERVICE_URL=http://llm-service:8080
            BACKEND_SERVER_PORT=8080
            POSTGRES_HOST=${{ vars.POSTGRES_HOST }}
            PUBLIC_HOST=${{ vars.PUBLIC_HOST }}
            AUTH_COOKIE_SECURE=false
            NEXT_PUBLIC_ENABLE_MOCK_CHECKOUT=false
            CONFRAPIX_BASE_URL=${{ vars.CONFRAPIX_BASE_URL }}
            CONFRAPIX_TOKEN=${{ secrets.CONFRAPIX_TOKEN }}
            CONFRAPIX_CALLBACK_URL=${{ vars.CONFRAPIX_CALLBACK_URL }}
            CONFRAPIX_WEBHOOK_SECRET=${{ secrets.CONFRAPIX_WEBHOOK_SECRET }}
            PIX_EXPIRATION_MINUTES=${{ vars.PIX_EXPIRATION_MINUTES }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            GROQ_BASE_URL=${{ secrets.GROQ_BASE_URL }}
            EOF
      
            git pull origin main
            docker compose -f infrastructure/docker-compose.yml down
            docker compose \
              --env-file .env \
              -f infrastructure/docker-compose.yml \
              up -d --build
            docker image prune -f
